<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Tunisia</title>
    <!-- تضمين مكتبة Pi Network -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f9f9f9; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        button { background-color: #673AB7; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI Trip Tunisia 🚀</h2>
        <p>Welcome to your smart AI travel assistant.</p>
        
        <!-- زر إطلاق عملية الدفع التجريبية -->
        <button id="pay-btn" onclick="makeTestPayment()">اضغط هنا لتجربة الدفع واجتياز الخطوة</button>
    </div>

    <script>
        // تهيئة مكتبة الـ SDK
        Pi.init({ version: "2.0", sandbox: true });

        async function makeTestPayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.0000001,
                    memo: "Testnet deployment confirmation transfer",
                    metadata: { orderId: "1234" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Ready for approval:", paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("Ready for completion:", txid);
                    },
                    onCancel: function(paymentId) { console.log("Cancelled"); },
                    onError: function(error, paymentId) { console.error("Error", error); }
                });
            } catch (err) {
                alert("يرجى المحاولة من داخل متصفح Pi Browser فقط.");
            }
        }
    </script>
</body>
</html>
