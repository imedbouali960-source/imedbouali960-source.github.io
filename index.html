<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Tunisia</title>
    <!-- تضمين مكتبة Pi SDK الرسمية لربط الحساب والمدفوعات لاحقاً -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="background-color: #f7f9fa; font-family: Arial, sans-serif; text-align: center; padding: 50px 20px;">

    <div style="max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 style="color: #622599;">AI Trip Tunisia 🚀</h1>
        <p style="color: #555; font-size: 16px;">Welcome to your smart AI travel assistant for discovering Tunisia's historical sites and culture.</p>
        <div style="margin-top: 20px; font-weight: bold; color: #ffa500; background: #fff5e6; padding: 10px; border-radius: 8px;">
            Pi Network Testnet Mode Enabled
        </div>
    </div>

    <script>
        // تهيئة مكتبة Pi للعمل داخل بيئة الفحص والتجربة (Sandbox) لتجاوز خطوة الإعداد
        Pi.init({ version: "2.0", sandbox: true });
        console.log("Pi SDK has been initialized successfully.");
    </script>
</body>
</html>
